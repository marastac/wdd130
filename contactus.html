<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Electric Vehicles</title>
  <link rel="stylesheet" href="styles/contactus.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo-link">
        <img src="images/logo.png" alt="Dry Oar Logo" class="logo" />
      </a>
      <nav>
        <ul>
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="page2.html" class="nav-link">Page 2</a></li>
          <li><a href="site-plan-rafting.html" class="nav-link">Site Plan</a></li>
          <li><a href="contactus.html" class="nav-link">Contact Us</a></li>
        </ul>
      </nav>
      <div class="social-links">
        <a href="#" class="social-icon"><img src="images/facebook.png" alt="Facebook" /></a>
        <a href="#" class="social-icon"><img src="images/twitter.png" alt="Twitter" /></a>
        <a href="#" class="social-icon"><img src="images/instagram.png" alt="Instagram" /></a>
      </div>
    </div>
  </header>
  <main>
    <div class="container">
      <h1>Contact Us</h1>
      <div id="feedback"></div> <!-- Add the feedback element here -->
      <form action="/submit-form" method="post">
        <ul>
          <li>
            <label for="name">Name:</label>
            <input type="text" id="name" name="user_name" required>
          </li>
          <li>
            <label for="mail">Email:</label>
            <input type="email" id="mail" name="user_email" required>
          </li>
          <li>
            <label for="msg">Message:</label>
            <textarea id="msg" name="user_message" rows="4" required></textarea>
          </li>
          <li class="button">
            <button type="submit">Send Message</button>
          </li>
        </ul>
      </form>
    </div>
  </main>
  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="page2.html" class="nav-link">Page 2</a>
        <a href="site-plan-rafting.html">Site Plan</a>
        <a href="contactus.html">Contact Us</a>
      </div>
      <p>&copy; 2023 Dry Oar. All rights reserved.</p>
    </div>
  </footer>

  <!-- Add the JavaScript code here -->
  <script>
    // JavaScript code from the task goes here
    const feedbackElement = document.getElementById('feedback');
    const formElement = document.forms[0];
    formElement.addEventListener('submit', function(e) {
      e.preventDefault();
      feedbackElement.innerHTML = 'Hello ' + formElement.user_name.value + '! Thank you for your message. We will get back to you as soon as possible!';
      feedbackElement.style.display = "block";
      document.body.classList.toggle('moveDown');
    });
  </script>

</body>
</html>
